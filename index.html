<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily & Love Celebration - Princess Birthdayy!!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff5f8; font-family: 'Poppins', sans-serif; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .card { background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 30px; text-align: center; width: 280px; border: 2px solid #ffcad4; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); }
        .photo-container { width: 120px; height: 120px; margin: 0 auto 15px auto; border-radius: 50%; border: 4px solid #ff9a9e; overflow: hidden; display: none; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Dancing Script', cursive; color: #ff4d6d; margin-bottom: 10px; }
        #greeting { color: #ff8fa3; font-weight: 600; font-size: 18px; margin-bottom: 20px; }
        #typewriter { color: #555; margin: 20px 0; min-height: 60px; line-height: 1.6; }
        .btn-action { background: linear-gradient(45deg, #ff4d6d, #ff8fa3); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 16px; transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="card">
            <h1 id="mainTitle" style="display:none;">Special for Princess 💞</h1>
            
            <div id="greetingContainer">
                <h1>Hello There! ❤️</h1>
                <p id="greeting">Welcome to this little surprise.</p>
            </div>

            <div class="photo-container" id="photoBox">
                <img src="images/image.jpeg" id="fotoUtama" alt="Foto Kejutan">
            </div>
            
            <div id="typewriter">Pencet tombol di bawah buat ngelihat sesuatu...</div>
            
            <button id="nextBtn" class="btn-action">Mulai ✨</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('myAudio');
        const textElement = document.getElementById('typewriter');
        const photoBox = document.getElementById('photoBox');
        const mainTitle = document.getElementById('mainTitle');
        const greetingContainer = document.getElementById('greetingContainer');
        
        let particles = [];
        let step = 0;
        const story = [
            "Hai... Ada sesuatu yang mau gue kasih tau ke lo.",
            "Sebenernya, setiap hari yang gue lewati bareng lo itu berharga banget...",
            "Makasih ya udah selalu ada dan bikin hari-hari gue jadi lebih berwarna.",
            "Semoga kejutan kecil ini bisa bikin lo senyum hari ini."
        ];

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                textElement.innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1, fnCallback), 40);
            } else if (fnCallback) setTimeout(fnCallback, 600);
        }

        function nextStep() {
            if (step === 0) {
                // Audio dimainkan saat tombol pertama ditekan
                audio.play().catch(e => console.log("Audio menunggu interaksi"));
                greetingContainer.style.display = 'none';
            }

            if (step < story.length) {
                nextBtn.style.display = "none";
                textElement.innerHTML = "";
                typeWriter(story[step], 0, () => { 
                    nextBtn.style.display = "inline-block";
                    nextBtn.innerHTML = "Lanjut ✨"; 
                });
                step++;
            } else {
                photoBox.style.display = "block";
                mainTitle.style.display = "block";
                textElement.innerHTML = "Makasih ya buat semuanya! Kamu berharga banget! ❤️";
                nextBtn.innerHTML = "YEAYYYYY!! 🎆";
                createExplosion(window.innerWidth / 2, window.innerHeight / 2);
                nextBtn.onclick = triggerYayFirework;
            }
        }

        function triggerYayFirework(e) {
            const x = e.clientX || window.innerWidth / 2;
            const y = e.clientY || window.innerHeight / 2;
            createExplosion(x, y);
            setTimeout(() => createExplosion(x - 100, y - 100), 100);
            setTimeout(() => createExplosion(x + 100, y - 100), 100);
            setTimeout(() => createExplosion(x, y - 150), 200);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x, y, isTrail = false) {
                this.x = x; this.y = y; this.isTrail = isTrail;
                if (isTrail) {
                    this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*2;
                    this.life = 0.5; this.decay = 0.02; this.size = 30; this.emoji = '🦋';
                } else {
                    const angle = Math.random()*Math.PI*2;
                    const force = Math.random()*8+4;
                    this.vx = Math.cos(angle)*force;
                    this.vy = Math.sin(angle)*force - 3;
                    this.life = 1; this.decay = Math.random()*0.01 + 0.005;
                    this.size = Math.random()*20+15;
                    this.emoji = ['🌸', '🌸', '🌸', '🌸', '🌸'][Math.floor(Math.random()*5)];
                }
                this.friction = 0.96;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.life;
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, this.x, this.y); ctx.restore();
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += 0.12; this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 35; i++) particles.push(new Particle(x, y, false));
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
            requestAnimationFrame(loop);
        }

        window.addEventListener('mousemove', (e) => particles.push(new Particle(e.clientX, e.clientY, true)));
        window.addEventListener('touchmove', (e) => particles.push(new Particle(e.touches[0].clientX, e.touches[0].clientY, true)));

        nextBtn.onclick = nextStep;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        loop();

        // Hujan background (Lily)
        setInterval(() => {
            if (particles.filter(p => !p.isBurst && p.type === 'lily').length < 20) {
                particles.push(new Particle(Math.random()*canvas.width, -30, false, 'lily'));
            }
        }, 1000);
    </script>
</body>
</html>
